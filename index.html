<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 통계 — AttendMate_Stat</title>
<meta name="description" content="AttendMate_Stat 타임/학년/반별 출석 통계">
<link rel="stylesheet" href="assets/css/tokens.css?v=20260704h">
<link rel="stylesheet" href="assets/css/base.css?v=20260704h">
<link rel="stylesheet" href="assets/css/components.css?v=20260704h">
<link rel="stylesheet" href="assets/css/stats.css?v=20260704h">
</head>
<body>

<nav class="global-nav">
  <div class="app-switcher">
    <button id="appSwitcherBtn" type="button" class="app-switcher__trigger">
      <span class="text-nav-link" style="font-weight:600;">AttendMate_Stat</span>
      <svg class="app-switcher__chevron" width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div id="appSwitcherMenu" class="app-switcher__menu" style="display:none;">
      <span class="app-switcher__item app-switcher__item--current">출석 통계</span>
      <a class="app-switcher__item" href="https://suuuuuuungho.github.io/AttendMate/">좌석 배치 현황</a>
    </div>
  </div>
  <div class="global-nav__actions">
    <span id="lastUpdated" class="text-caption" style="opacity:0.85;"></span>
    <button id="refreshBtn" class="btn-dark-utility">새로고침</button>
  </div>
</nav>

<div class="sub-nav-frosted">
  <span class="sub-nav-frosted__title">출석 통계</span>
  <div class="sub-nav-frosted__links">
    <div id="timeTabs" class="time-tabs"></div>
  </div>
</div>

<main class="stats-page">
  <section class="stat-hero">
    <span id="heroTime" class="stat-hero__time text-caption-strong"></span>
    <div class="stat-hero__split">
      <div class="stat-hero__split-item">
        <div id="studentCount" class="stat-hero__split-value">0명</div>
        <div class="stat-hero__split-label text-caption">학생</div>
      </div>
      <div class="stat-hero__split-item">
        <div id="teacherCount" class="stat-hero__split-value">0명</div>
        <div class="stat-hero__split-label text-caption">교사</div>
      </div>
    </div>
  </section>

  <section class="stat-section">
    <div id="statTree" class="stat-tree"></div>
    <div id="statTreeEmpty" class="stats-empty text-caption" style="display:none;">명단이 없습니다.</div>
  </section>
</main>

<div id="attendanceConfirmModal" class="modal-overlay" style="display:none">
  <div class="modal-panel">
    <h3 class="text-body-strong on-light" id="attendanceConfirmTitle">출석 처리</h3>
    <div id="attendanceConfirmBody" class="attendance-confirm__body"></div>
    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <button id="attendanceConfirmCancelBtn" class="btn-secondary-pill">취소</button>
      <button id="attendanceConfirmOkBtn" class="btn-primary">확인</button>
    </div>
  </div>
</div>

<script type="module" src="assets/js/stats.js?v=20260704h"></script>
</body>
</html>
